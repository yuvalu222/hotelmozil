<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HotelMozil — המחיר המקומי לכל מלון</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", Arial, "Arial Hebrew", sans-serif; color: #0B1B33; background: #F5F7FB; line-height: 1.7; min-height: 100vh; }
  .hero { background: linear-gradient(135deg, #0EA5E9, #4F46E5); color: #fff; padding: 64px 20px 56px; text-align: center; }
  .mark { width: 76px; height: 76px; border-radius: 22px; background: rgba(255,255,255,.15); display: inline-flex; align-items: center; justify-content: center; font-size: 38px; margin-bottom: 16px; backdrop-filter: blur(4px); }
  .hero h1 { font-size: 34px; letter-spacing: -0.5px; }
  .hero h1 span { opacity: .9; font-weight: 400; }
  .hero p { font-size: 17px; opacity: .95; margin-top: 10px; }
  .wrap { max-width: 720px; margin: -32px auto 0; padding: 0 18px 60px; }
  .cards { display: grid; gap: 14px; }
  .card { display: flex; align-items: center; gap: 16px; background: #fff; border: 1px solid #E3EAF4; border-radius: 18px; padding: 20px 22px; text-decoration: none; color: inherit; box-shadow: 0 6px 20px rgba(11,27,51,.05); transition: transform .15s ease, box-shadow .15s ease; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(11,27,51,.10); }
  .ico { width: 46px; height: 46px; border-radius: 12px; background: #E7EEFC; color: #2563EB; display: flex; align-items: center; justify-content: center; font-size: 22px; flex: none; }
  .card h2 { font-size: 18px; color: #0B1B33; }
  .card p { font-size: 14px; color: #4D5D77; margin-top: 2px; }
  .chev { margin-inline-start: auto; color: #9AA8BF; font-size: 20px; }
  .foot { text-align: center; color: #4D5D77; font-size: 13px; margin-top: 30px; }
  .foot a { color: #2563EB; }
</style>
</head>
<body>
  <div class="hero">
    <div class="mark">📍</div>
    <h1>HotelMozil</h1>
    <p>אותו מלון בדיוק — במחיר המקומי הזול ביותר.</p>
  </div>

  <div class="wrap">
    <div class="cards">
      <a class="card" href="privacy.html">
        <div class="ico">🔒</div>
        <div>
          <h2>מדיניות פרטיות</h2>
          <p>אילו נתונים אנו מעבדים — ומה לעולם לא.</p>
        </div>
        <div class="chev">‹</div>
      </a>

      <a class="card" href="terms.html">
        <div class="ico">📄</div>
        <div>
          <h2>תנאי שימוש</h2>
          <p>הכללים לשימוש בשירות.</p>
        </div>
        <div class="chev">‹</div>
      </a>

      <a class="card" href="support.html">
        <div class="ico">💬</div>
        <div>
          <h2>תמיכה ושאלות נפוצות</h2>
          <p>צריך עזרה? כל התשובות כאן.</p>
        </div>
        <div class="chev">‹</div>
      </a>
    </div>

    <p class="foot">
      יצירת קשר: <a href="mailto:hotelmozil@gmail.com">hotelmozil@gmail.com</a><br />
      © 2026 HotelMozil · יובל אוליאל
    </p>
  </div>
</body>
</html>
